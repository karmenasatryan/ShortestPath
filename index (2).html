<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <title>Route Optimizer - Final Navigation Version</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; }

        #welcome-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; color: white;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .start-btn {
            padding: 18px 50px; font-size: 1.4rem;
            background: #27ae60; color: white; border: none;
            border-radius: 50px; cursor: pointer; font-weight: bold;
            transition: transform 0.3s;
        }
        .start-btn:hover { transform: scale(1.05); background: #2ecc71; }

        h1 { text-align: center; padding: 20px; background: #2c3e50; color: white; font-size: 24px; }

        .container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }

        .panel {
            background: white; border-radius: 15px; padding: 25px;
            width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; max-height: 85vh; overflow-y: auto;
        }

        select, button.action-btn {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border-radius: 8px; border: 1px solid #ddd;
        }

        button.action-btn {
            background: #27ae60; color: white;
            border: none; font-weight: bold; cursor: pointer;
        }
        button.action-btn:disabled { background: #aaa; cursor: not-allowed; }

        .result {
            margin-top: 10px; padding: 15px;
            background: #f9f9f9; border-left: 4px solid #27ae60;
            border-radius: 5px; display: none;
        }

        #map { flex: 1; height: 600px; border-radius: 15px; }

        .leaflet-tooltip.label {
            background: #2c3e50; color: white;
            border-radius: 4px; padding: 3px 7px; font-weight: bold; border: none;
        }

        #status-msg { font-size: 0.85rem; color: #888; margin-bottom: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div id="welcome-screen">
    <h1>🎓 Route Optimizer</h1>
    <button class="start-btn" onclick="startProgram()">Start Finding</button>
</div>

<h1>🎓 Համալսարանների Կարճագույն Երթուղի</h1>
<div class="container">
    <div class="panel">
        <label>Սկզբնակետ</label>
        <select id="from">
            <option value="1">YSU (ԵՊՀ)</option>
            <option value="2">AUA (Ամերիկյան)</option>
            <option value="3">NPUA (Պոլիտեխնիկ)</option>
            <option value="4">ASUE (Տնտեսագիտական)</option>
            <option value="5">YSMU (Բժշկական)</option>
            <option value="6">RAU (Սլավոնական)</option>
            <option value="7">ANAU (Ագրարային)</option>
            <option value="8">Brusov (Բրյուսով)</option>
            <option value="9">UFAR (Ֆրանսիական)</option>
            <option value="10">EUA (Եվրոպական)</option>
            <option value="11">YSAFA (Գեղարվեստի)</option>
        </select>

        <label>Destination</label>
        <select id="to">
            <option value="1">YSU (ԵՊՀ)</option>
            <option value="2" selected>AUA (Ամերիկյան)</option>
            <option value="3">NPUA (Պոլիտեխնիկ)</option>
            <option value="4">ASUE (Տնտեսագիտական)</option>
            <option value="5">YSMU (Բժշկական)</option>
            <option value="6">RAU (Սլավոնական)</option>
            <option value="7">ANAU (Ագրարային)</option>
            <option value="8">Brusov (Բրյուսով)</option>
            <option value="9">UFAR (Ֆրանսիական)</option>
            <option value="10">EUA (Եվրոպական)</option>
            <option value="11">YSAFA (Գեղարվեստի)</option>
        </select>

        <div id="status-msg"></div>
        <button class="action-btn" id="find-btn" onclick="findPath()">Գտնել Ճանապարհը</button>

        <div class="result" id="result">
            <div id="total-km"></div>
            <hr style="margin: 10px 0; border: 0; border-top: 1px solid #eee;">
            <div id="path-steps"></div>
        </div>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const ORS_API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjcyYTZkYjlkM2ZkNzQyMmM4YTU4YTM4NzUzYzg1Y2MwIiwiaCI6Im11cm11cjY0In0=";

    function startProgram() {
        const screen = document.getElementById('welcome-screen');
        screen.style.opacity = '0';
        setTimeout(() => { screen.style.visibility = 'hidden'; }, 600);
    }

    const map = L.map('map').setView([40.1858, 44.5151], 14);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    const universities = {
        1:  { name: "YSU",    lat: 40.1819, lng: 44.5265 },
        2:  { name: "AUA",    lat: 40.1925, lng: 44.5042 },
        3:  { name: "NPUA",   lat: 40.1878, lng: 44.5226 },
        4:  { name: "ASUE",   lat: 40.1872, lng: 44.5278 },
        5:  { name: "YSMU",   lat: 40.1887, lng: 44.5262 },
        6:  { name: "RAU",    lat: 40.2115, lng: 44.5028 },
        7:  { name: "ANAU",   lat: 40.1895, lng: 44.5245 },
        8:  { name: "Brusov", lat: 40.1865, lng: 44.5101 },
        9:  { name: "UFAR",   lat: 40.2101, lng: 44.5298 },
        10: { name: "EUA",    lat: 40.1950, lng: 44.5270 },
        11: { name: "YSAFA",  lat: 40.1815, lng: 44.5185 }
    };

    Object.values(universities).forEach(u => {
        L.marker([u.lat, u.lng]).addTo(map)
         .bindTooltip(`<b>${u.name}</b>`, { permanent: true, className: 'label' });
    });

    let pathLine = null;

    function setStatus(msg) {
        document.getElementById('status-msg').textContent = msg;
    }

    async function findPath() {
        const fromId = parseInt(document.getElementById('from').value);
        const toId   = parseInt(document.getElementById('to').value);
        const start  = universities[fromId];
        const end    = universities[toId];

        if (fromId === toId) {
            alert("Սկզբնակետը և վերջնակետը նույնն են։");
            return;
        }

        const btn = document.getElementById('find-btn');
        btn.disabled = true;
        setStatus("⏳ Երթուղին փնտրվում է...");

        try {
            const response = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson", {
                method: "POST",
                headers: {
                    "Authorization": ORS_API_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    coordinates: [
                        [start.lng, start.lat],
                        [end.lng,   end.lat]
                    ],
                    language: "en",
                    units: "m"
                })
            });

            if (!response.ok) {
                const err = await response.json();
                console.error("ORS Error:", err);
                alert("Երթուղին չգտնվեց։ Կրկին փորձեք։");
                setStatus("");
                btn.disabled = false;
                return;
            }

            const data = await response.json();
            const feature  = data.features[0];
            const coords   = feature.geometry.coordinates.map(c => [c[1], c[0]]);
            const summary  = feature.properties.summary;
            const distance = summary.distance;
            const duration = summary.duration;
            const segments = feature.properties.segments;

            const driveTime = Math.round(duration / 60);
            const walkTime  = Math.round((distance / 1.3) / 60);
            const km        = (distance / 1000).toFixed(2);

            document.getElementById('total-km').innerHTML = `
                <div style="font-size: 0.95rem; line-height: 1.8;">
                    📏 Հեռավորություն: <b>${km} կմ</b><br>
                    🚗 Մեքենայով: <b>${driveTime} րոպե</b><br>
                    🏃 Ոտքով: <b>${walkTime} րոպե</b>
                </div>`;

            let stepsHtml = '<p style="font-weight:bold; margin-bottom:5px;">Ինչպես հասնել՝</p>';
            stepsHtml += '<ul style="font-size: 0.85rem; padding-left: 15px; color: #555;">';
            segments[0].steps.forEach(s => {
                if (s.instruction) {
                    stepsHtml += `<li style="margin-bottom:4px;">${s.instruction}</li>`;
                }
            });
            stepsHtml += '</ul>';

            document.getElementById('path-steps').innerHTML = stepsHtml;
            document.getElementById('result').style.display = 'block';

            if (pathLine) map.removeLayer(pathLine);
            pathLine = L.polyline([], { color: '#ff4757', weight: 5, opacity: 0.8 }).addTo(map);

            let i = 0;
            const totalPoints   = coords.length;
            const stepIncrement = Math.ceil(totalPoints / 40);

            function animate() {
                if (i < totalPoints) {
                    pathLine.addLatLng(coords[i]);
                    i += (stepIncrement > 0 ? stepIncrement : 1);
                    setTimeout(animate, 30);
                } else {
                    pathLine.addLatLng(coords[totalPoints - 1]);
                }
            }

            animate();
            map.fitBounds(L.polyline(coords).getBounds(), { padding: [50, 50] });
            setStatus("✅ Երթուղին հաջողությամբ գտնվեց");

        } catch (error) {
            console.error("Error:", error);
            alert("Կապի խնդիր։ Խնդրում ենք ստուգել ինտերնետը կամ փորձել քիչ ուշ։");
            setStatus("");
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
