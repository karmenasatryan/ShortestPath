<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <title>Հայկական Համալսարաններ - Ճշգրիտ Քարտեզ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; }

    h1 {
      text-align: center;
      padding: 20px;
      background: #2c3e50;
      color: white;
      font-size: 24px;
      letter-spacing: 1px;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: auto;
    }

    .panel {
      background: white;
      border-radius: 15px;
      padding: 25px;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    label { font-weight: bold; margin-bottom: 5px; color: #34495e; }

    select, button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 15px;
    }

    button {
      background: #27ae60;
      color: white;
      border: none;
      font-weight: bold;
      transition: background 0.3s;
      cursor: pointer;
    }

    button:hover { background: #219150; }

    .result {
      margin-top: 10px;
      padding: 15px;
      background: #f9f9f9;
      border-left: 4px solid #27ae60;
      border-radius: 5px;
      display: none;
    }

    #path-steps { font-size: 14px; line-height: 1.6; color: #555; }
    #total-km { font-weight: bold; color: #c0392b; margin-top: 10px; font-size: 16px; }

    .leaflet-tooltip.label {
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 3px 7px;
      font-weight: bold;
    }

    #map {
      flex: 1;
      height: 600px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<h1>🎓 Համալսարանների Կարճագույն Երթուղի (Walker Mode)</h1>

<div class="container">
  <div class="panel">
    <label>Սկզբնակետ</label>
    <select id="from">
      <option value="1">YSU (ԵՊՀ)</option>
      <option value="2">AUA (Ամերիկյան)</option>
      <option value="3">NPUA (Պոլիտեխնիկ)</option>
      <option value="4">ASUE (Տնտեսագիտական)</option>
      <option value="5">YSMU (Բժշկական)</option>
      <option value="6">RAU (Սլավոնական)</option>
      <option value="7">ANAU (Ագրարային)</option>
      <option value="8">Brusov (Բրյուսով)</option>
      <option value="9">UFAR (Ֆրանսիական)</option>
      <option value="10">EUA (Եվրոպական)</option>
      <option value="11">YSAFA (Գեղարվեստի)</option>
    </select>

    <label>Destination</label>
    <select id="to">
      <option value="2">AUA (Ամերիկյան)</option>
      <option value="1">YSU (ԵՊՀ)</option>
      <option value="3">NPUA (Պոլիտեխնիկ)</option>
      <option value="4">ASUE (Տնտեսագիտական)</option>
      <option value="5">YSMU (Բժշկական)</option>
      <option value="6">RAU (Սլավոնական)</option>
      <option value="7">ANAU (Ագրարային)</option>
      <option value="8">Brusov (Բրյուսով)</option>
      <option value="9">UFAR (Ֆրանսիական)</option>
      <option value="10">EUA (Եվրոպական)</option>
      <option value="11">YSAFA (Գեղարվեստի)</option>
    </select>

    <button onclick="findPath()">Գտնել Ճանապարհը</button>

    <div class="result" id="result">
      <h4 style="margin-bottom:10px; color:#2c3e50;">Երթուղի՝</h4>
      <div id="path-steps"></div>
      <div id="total-km"></div>
    </div>
  </div>

  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // Կենտրոնացում Երևանի վրա իրական կոորդինատներով
  const map = L.map('map').setView([40.1858, 44.5151], 14);
  
  // Google Maps-ի նման տեսքի համար օգտագործում ենք CartoDB տեսակը
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // Իրական կոորդինատներ՝ վերցված Backend-ի նոր տվյալներից
  const universities = {
    1: {name:"YSU", lat:40.1819, lng:44.5265},
    2: {name:"AUA", lat:40.1925, lng:44.5042},
    3: {name:"NPUA", lat:40.1878, lng:44.5226},
    4: {name:"ASUE", lat:40.1872, lng:44.5278},
    5: {name:"YSMU", lat:40.1887, lng:44.5262},
    6: {name:"RAU", lat:40.2115, lng:44.5028},
    7: {name:"ANAU", lat:40.1895, lng:44.5245},
    8: {name:"Brusov", lat:40.1865, lng:44.5101},
    9: {name:"UFAR", lat:40.2101, lng:44.5298},
    10: {name:"EUA", lat:40.1950, lng:44.5270},
    11: {name:"YSAFA", lat:40.1815, lng:44.5185},
    20: {name:"Opera", lat:40.1858, lng:44.5151},
    21: {name:"Republic Sq", lat:40.1777, lng:44.5126},
    22: {name:"Yeritasardakan", lat:40.1860, lng:44.5210},
    23: {name:"Cascade", lat:40.1911, lng:44.5192},
    24: {name:"Baghramyan Ave", lat:40.1900, lng:44.5140}
  };

  // Ավելացնել բոլոր մարկերները քարտեզի վրա
  Object.values(universities).forEach(u => {
    const marker = L.marker([u.lat, u.lng]).addTo(map);
    marker.bindTooltip(`<b>${u.name}</b>`, {
      permanent: true,
      direction: 'top',
      className: 'label'
    });
  });

  let pathLine = null;

  async function findPath() {
    const fromId = +document.getElementById('from').value;
    const toId = +document.getElementById('to').value;

    try {
      const res = await fetch('http://localhost:5072/api/Path/shortest-path', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({fromId, toId})
      });

      if (!res.ok) throw new Error("Backend connection failed");

      const data = await res.json();

      // Ցույց տալ քայլերը (Names)
      document.getElementById('path-steps').innerHTML = 
        data.path.map((p, index) => `${index + 1}. ${p.name}`).join("<br>");

      // Ցույց տալ հեռավորությունը
      document.getElementById('total-km').textContent = 
        "Ընդհանուր հեռավորություն: " + data.totalKm + " կմ";

      document.getElementById('result').style.display = 'block';

      // Հեռացնել հին գիծը
      if(pathLine) map.removeLayer(pathLine);

      // Ստեղծել նոր գիծը ճշգրիտ կոորդինատներով
      const coords = data.path.map(p => {
        const u = universities[p.id];
        return [u.lat, u.lng];
      });

      pathLine = L.polyline(coords, {
        color: '#e74c3c',
        weight: 5,
        opacity: 0.8,
        dashArray: '10, 10' // Կետագծեր քայլողի համար
      }).addTo(map);

      map.fitBounds(pathLine.getBounds(), { padding: [50, 50] });
      
    } catch (error) {
      alert("Error: Համոզվեք, որ Backend-ը միացված է (localhost:5072)");
    }
  }
</script>

</body>
</html>
